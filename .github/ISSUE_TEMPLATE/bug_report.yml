name: Bug Report
description: File a bug report to help us improve the platform.
title: "[BUG]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: description
    attributes:
      label: Describe the Bug
      description: A clear and concise description of what the bug is.
      placeholder: E.g., The customer list is displaying "Loading..." indefinitely for normal users.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How did you encounter this bug? Please provide step-by-step instructions.
      placeholder: |
        1. Start the server using `pnpm start`
        2. Go to '...'
        3. Click on '...'
        4. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: A clear and concise description of what you expected to happen.
    validations:
      required: false
  - type: textarea
    id: environment
    attributes:
      label: Environment Details
      description: Please provide details about your development/runtime environment.
      placeholder: |
        - **OS:** E.g., Windows 11, Ubuntu 24.04, macOS Sonoma
        - **Node.js Version:** E.g., v22.2.0
        - **Python Version:** E.g., v3.11.4
        - **Browser:** E.g., Chrome, Firefox, Safari
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Add any other context or upload screenshots about the problem here.
    validations:
      required: false
