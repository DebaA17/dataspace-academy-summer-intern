name: Python CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~\AppData\Local\pip\Cache
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest bandit pip-audit

      - name: Verify Django App
        run: |
          python backend/manage.py check

      - name: Run Tests
        run: |
          python -m pytest

      - name: Security Scan (Bandit)
        run: |
          bandit -r backend ml

      - name: Dependency Audit
        run: |
          pip-audit -r requirements.txt

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && github.repository == 'DebaA17/dataspace-academy-summer-intern'
    steps:
      - name: Trigger and Monitor Render Deploy
        run: |
          # 1. Trigger the deploy hook and capture the response
          response=$(curl -s -f -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}")
          echo "Deploy triggered successfully!"
          
          # 2. Extract the deploy ID
          deploy_id=$(echo "$response" | jq -r '.deploy.id')
          echo "Deploy ID: $deploy_id"
          
          # 3. Check if we have credentials to monitor the status
          if [ -z "${{ secrets.RENDER_API_KEY }}" ] || [ -z "${{ secrets.RENDER_SERVICE_ID }}" ]; then
            echo "RENDER_API_KEY or RENDER_SERVICE_ID secrets are not set."
            echo "Skipping real-time monitoring. Check your Render dashboard for build status."
            exit 0
          fi
          
          echo "Monitoring deployment status..."
          while true; do
            # Query the Render API for the deployment status
            status_response=$(curl -s -f \
              -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
              "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys/$deploy_id")
            
            status=$(echo "$status_response" | jq -r '.status')
            echo "Current status: $status"
            
            if [ "$status" = "live" ]; then
              echo "Deployment succeeded!"
              exit 0
            elif [ "$status" = "build_failed" ] || [ "$status" = "update_failed" ] || [ "$status" = "canceled" ]; then
              echo "Deployment failed with status: $status"
              exit 1
            fi
            
            sleep 15
          done
