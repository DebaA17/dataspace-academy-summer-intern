name: PR Validation

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    name: Build, Test & Security Checks
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~\AppData\Local\pip\Cache
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest bandit pip-audit

      - name: Python Syntax Validation
        run: |
          python -m compileall backend ml

      - name: Django System Check
        run: |
          python backend/manage.py check

      - name: Run Tests
        run: |
          python -m pytest

      - name: Security Scan (Bandit)
        run: |
          bandit -r backend ml

      - name: Dependency Audit
        run: |
          pip-audit -r requirements.txt

      - name: Build Docker Image
        if: matrix.os == 'ubuntu-latest'
        run: |
          docker build -t pr-validation-image .

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: |
          pnpm install
          pnpm --dir frontend install

      - name: Test pnpm start Bootstrapper
        shell: bash
        run: |
          pnpm start &
          PID=$!
          sleep 20
          kill $PID || (echo "pnpm start crashed or terminated prematurely!" && exit 1)




