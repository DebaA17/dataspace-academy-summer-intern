name: Label PR

on:
  workflow_run:
    workflows: ["PR Validation"]
    types:
      - requested
      - completed

permissions:
  pull-requests: write
  contents: read

jobs:
  update-labels:
    runs-on: ubuntu-latest
    steps:
      - name: Update Labels
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const action = context.payload.action; // 'requested' or 'completed'
            const run = context.payload.workflow_run;
            
            // 1. Retrieve the pull request number
            let prNumber = null;
            if (run.pull_requests && run.pull_requests.length > 0) {
              prNumber = run.pull_requests[0].number;
            } else {
              // Fallback to searching pull requests associated with the commit SHA
              const { data: pulls } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
                owner,
                repo,
                commit_sha: run.head_sha
              });
              const pr = pulls.find(p => p.state === 'open');
              if (pr) {
                prNumber = pr.number;
              }
            }
            
            if (!prNumber) {
              console.log('No open pull request found for this workflow run.');
              return;
            }
            
            console.log(`Processing PR #${prNumber} for action: ${action}`);
            
            const passedLabel = "pipeline-validation-passed";
            const failedLabel = "pipeline-validation-failed";
            
            // Helper function to remove a label if it exists on the PR
            async function removeLabelIfExists(labelName) {
              try {
                await github.rest.issues.removeLabel({
                  owner,
                  repo,
                  issue_number: prNumber,
                  name: labelName
                });
                console.log(`Removed label: ${labelName}`);
              } catch (e) {
                // Ignore errors if the label is not present
                console.log(`Failed to remove or label was not present: ${labelName}`);
              }
            }
            
            // Helper function to add a label if it is not already present
            async function addLabel(labelName) {
              try {
                await github.rest.issues.addLabels({
                  owner,
                  repo,
                  issue_number: prNumber,
                  labels: [labelName]
                });
                console.log(`Added label: ${labelName}`);
              } catch (e) {
                console.error(`Failed to add label: ${labelName}`, e);
              }
            }
            
            if (action === 'requested') {
              // Clear both validation labels when a run is requested
              await removeLabelIfExists(passedLabel);
              await removeLabelIfExists(failedLabel);
            } else if (action === 'completed') {
              const conclusion = run.conclusion;
              console.log(`Workflow run conclusion: ${conclusion}`);
              
              if (conclusion === 'success') {
                await removeLabelIfExists(failedLabel);
                await addLabel(passedLabel);
              } else {
                await removeLabelIfExists(passedLabel);
                await addLabel(failedLabel);
              }
            }
